<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061827"/>
      <stop offset="0.55" stop-color="#102a3a"/>
      <stop offset="1" stop-color="#1d2438"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe39b"/>
      <stop offset="0.45" stop-color="#d7a941"/>
      <stop offset="1" stop-color="#8f641d"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#71d6c6"/>
      <stop offset="1" stop-color="#1f7a6f"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffca7b"/>
      <stop offset="1" stop-color="#f28d37"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#e6b54e" flood-opacity=".16"/>
    </filter>
    <style>
      .title{font:900 64px Georgia,serif;fill:#fff}
      .sub{font:600 22px Inter,Arial,sans-serif;fill:#aac0cc}
      .cardTitle{font:900 30px Georgia,serif;fill:#fff}
      .cardSub{font:700 16px Inter,Arial,sans-serif;fill:#9fb5c1}
      .word{font:900 58px Georgia,serif;fill:#fff;font-style:italic}
      .tag{font:900 13px Inter,Arial,sans-serif;fill:#14212b}
      .small{font:700 14px Inter,Arial,sans-serif;fill:#d4e1e8}
      .strokeGold{stroke:url(#gold);stroke-width:8;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .strokeTeal{stroke:url(#teal);stroke-width:8;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .thinGold{stroke:url(#gold);stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect width="1600" height="1100" fill="url(#bg)"/>
  <circle cx="140" cy="70" r="260" fill="#7c3aed" opacity=".10"/>
  <circle cx="1460" cy="150" r="300" fill="#f59e0b" opacity=".10"/>
  <circle cx="900" cy="1120" r="360" fill="#06b6d4" opacity=".08"/>

  <text x="90" y="105" class="title">Odyssey logo directions</text>
  <text x="92" y="145" class="sub">If I were choosing today: use logo 9. If refining for launch: use Concept A as the cleanest brand-system direction.</text>

  <!-- Current logo 9 recommendation card -->
  <g transform="translate(90,210)" filter="url(#shadow)">
    <rect width="680" height="330" rx="38" fill="rgba(255,255,255,.075)" stroke="rgba(255,255,255,.16)"/>
    <rect x="32" y="32" width="132" height="132" rx="66" fill="#061827" stroke="#d9aa45" stroke-width="3"/>
    <path d="M64 104 C88 78, 125 78, 149 104" class="thinGold"/>
    <path d="M74 119 C96 102, 118 102, 140 119" class="thinGold"/>
    <circle cx="106" cy="82" r="34" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <path d="M93 73 C109 95, 124 74, 146 88" class="strokeTeal" stroke-width="5"/>
    <path d="M106 131 C128 112, 138 94, 151 70" stroke="url(#gold)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <text x="190" y="82" class="cardTitle">Logo 9</text>
    <text x="190" y="116" class="cardSub">Best of your uploaded options</text>
    <text x="190" y="178" class="word">Odyssey</text>
    <rect x="190" y="215" width="154" height="32" rx="16" fill="url(#gold)"/>
    <text x="213" y="237" class="tag">MY PICK NOW</text>
    <text x="190" y="286" class="small">Premium, dark, educational, and already close to the current website mood.</text>
  </g>

  <!-- Concept A -->
  <g transform="translate(830,210)" filter="url(#shadow)">
    <rect width="680" height="330" rx="38" fill="rgba(255,255,255,.075)" stroke="rgba(255,255,255,.16)"/>
    <rect x="32" y="32" width="132" height="132" rx="34" fill="#071b29" stroke="#d9aa45" stroke-width="3"/>
    <path d="M62 113 C84 96, 105 96, 126 113 C142 103, 154 101, 168 110" class="strokeGold"/>
    <path d="M62 128 C88 112, 109 112, 136 128 C146 120, 157 118, 170 124" class="thinGold"/>
    <path d="M106 106 L132 65 L124 112" fill="url(#warm)"/>
    <path d="M132 65 C143 80, 151 97, 149 117" class="thinGold"/>
    <circle cx="102" cy="78" r="28" fill="none" stroke="url(#teal)" stroke-width="6"/>
    <text x="190" y="82" class="cardTitle">Concept A: Navigator Book</text>
    <text x="190" y="116" class="cardSub">Clean evolution of logo 9</text>
    <text x="190" y="178" class="word">Odyssey</text>
    <rect x="190" y="215" width="184" height="32" rx="16" fill="url(#teal)"/>
    <text x="214" y="237" class="tag">BEST FOR LAUNCH</text>
    <text x="190" y="286" class="small">Book + compass + path. Stronger in small header circles than the script-heavy logos.</text>
  </g>

  <!-- Concept B -->
  <g transform="translate(90,610)" filter="url(#shadow)">
    <rect width="680" height="330" rx="38" fill="rgba(255,255,255,.075)" stroke="rgba(255,255,255,.16)"/>
    <rect x="32" y="32" width="132" height="132" rx="66" fill="#071b29" stroke="#d9aa45" stroke-width="3"/>
    <circle cx="98" cy="98" r="44" fill="none" stroke="url(#gold)" stroke-width="9"/>
    <path d="M62 128 C86 98, 107 84, 142 62" stroke="url(#warm)" stroke-width="13" fill="none" stroke-linecap="round"/>
    <path d="M65 123 C91 118, 118 119, 142 126" class="strokeTeal"/>
    <path d="M128 55 L134 70 L151 70 L138 81 L143 97 L128 87 L113 97 L118 81 L105 70 L122 70 Z" fill="url(#gold)"/>
    <text x="190" y="82" class="cardTitle">Concept B: Horizon O</text>
    <text x="190" y="116" class="cardSub">Most modern and app-friendly</text>
    <text x="190" y="178" class="word">Odyssey</text>
    <rect x="190" y="215" width="164" height="32" rx="16" fill="url(#warm)"/>
    <text x="213" y="237" class="tag">MOST DIGITAL</text>
    <text x="190" y="286" class="small">The road through the O gives motion and ambition, but feels less academic.</text>
  </g>

  <!-- Concept C -->
  <g transform="translate(830,610)" filter="url(#shadow)">
    <rect width="680" height="330" rx="38" fill="rgba(255,255,255,.075)" stroke="rgba(255,255,255,.16)"/>
    <rect x="32" y="32" width="132" height="132" rx="38" fill="#071b29" stroke="#d9aa45" stroke-width="3"/>
    <circle cx="98" cy="95" r="42" fill="none" stroke="url(#teal)" stroke-width="7"/>
    <path d="M56 95 C80 73, 116 73, 140 95 C116 117, 80 117, 56 95Z" fill="none" stroke="url(#gold)" stroke-width="6"/>
    <path d="M98 53 C85 82, 85 108, 98 137 C111 108, 111 82, 98 53Z" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <path d="M76 134 C88 122, 108 122, 121 134" class="thinGold"/>
    <path d="M114 91 L143 63" stroke="url(#warm)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="145" cy="61" r="6" fill="url(#warm)"/>
    <text x="190" y="82" class="cardTitle">Concept C: Knowledge Orbit</text>
    <text x="190" y="116" class="cardSub">Global learning emphasis</text>
    <text x="190" y="178" class="word">Odyssey</text>
    <rect x="190" y="215" width="176" height="32" rx="16" fill="url(#gold)"/>
    <text x="214" y="237" class="tag">MOST GLOBAL</text>
    <text x="190" y="286" class="small">Good for worldwide scale, but slightly more generic than the book-road concept.</text>
  </g>
</svg>
